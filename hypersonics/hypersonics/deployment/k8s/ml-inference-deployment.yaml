apiVersion: apps/v1
kind: Deployment
metadata:
  name: regen-ml-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: regen-ml-inference
  template:
    metadata:
      labels:
        app: regen-ml-inference
    spec:
      containers:
        - name: ml-inference
          image: regen-twin/ml-inference:future
          resources:
            limits:
              nvidia.com/gpu: 1
