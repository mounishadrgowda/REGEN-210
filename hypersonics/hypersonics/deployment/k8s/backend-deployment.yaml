apiVersion: apps/v1
kind: Deployment
metadata:
  name: regen-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: regen-backend
  template:
    metadata:
      labels:
        app: regen-backend
    spec:
      containers:
        - name: backend
          image: regen-twin/backend:0.1.0
          ports:
            - containerPort: 8000
          env:
            - name: SIMULATION_TICK_HZ
              value: "5"
